<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#030712;
  color:#e5e7eb;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  height:100vh;
  position:fixed;
  background:#020617;
  border-right:1px solid rgba(255,255,255,.05);
  padding:24px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:30px;
}
.logo img{
  width:36px;
}
.logo span{
  font-weight:700;
  font-size:16px;
}

/* MENU */
.menu-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:6px;
}
.menu-item:hover{background:#0f172a;}
.active{
  background:#00c853;
  color:#000;
  font-weight:600;
}

/* CONTENT */
.content{
  margin-left:270px;
  padding:30px;
}

/* CARD */
.card{
  background:#0f172a;
  border-radius:14px;
  padding:20px;
  border:1px solid rgba(255,255,255,.05);
}

/* INPUT */
.input{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:8px;
  width:100%;
  margin-bottom:10px;
}

/* BTN */
.btn{
  background:#00c853;
  padding:10px;
  border-radius:8px;
  font-weight:600;
  width:100%;
}

/* KANBAN */
.column{
  background:#020617;
  padding:15px;
  border-radius:12px;
  border:1px solid #1e293b;
  min-height:400px;
}
.task{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="logo.png">
<span>Monaco CRM</span>
</div>

<div class="menu-item active" onclick="tab('dashboard',this)">Dashboard</div>
<div class="menu-item" onclick="tab('operaciones',this)">Operaciones</div>
<div class="menu-item" onclick="tab('turnos',this)">Turnos</div>
<div class="menu-item" onclick="tab('clientes',this)">Clientes</div>
<div class="menu-item" onclick="tab('vehiculos',this)">Vehículos</div>
<div class="menu-item" onclick="tab('caja',this)">Caja</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="grid grid-cols-4 gap-4">

<div class="card"><p>En proceso</p><h2 id="kpi_proceso">0</h2></div>
<div class="card"><p>Terminados</p><h2 id="kpi_terminado">0</h2></div>
<div class="card"><p>Facturación</p><h2 id="kpi_facturacion">$0</h2></div>
<div class="card"><p>Clientes</p><h2 id="kpi_clientes">0</h2></div>

</div>
</div>

<!-- OPERACIONES -->
<div id="operaciones" style="display:none">
<div class="grid grid-cols-3 gap-4">

<div class="column" id="pendiente"><h3>Pendiente</h3></div>
<div class="column" id="proceso"><h3>Proceso</h3></div>
<div class="column" id="terminado"><h3>Terminado</h3></div>

</div>
</div>

<!-- TURNOS -->
<div id="turnos" style="display:none">
<div class="card max-w-xl">

<input id="t_cliente" placeholder="Cliente" class="input">
<input id="t_tel" placeholder="Teléfono" class="input">
<input id="t_servicio" placeholder="Servicio" class="input">
<input id="t_fecha" type="date" class="input">

<button onclick="crearTurno()" class="btn">Crear turno</button>

</div>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<div class="card max-w-xl">

<input id="c_nombre" placeholder="Nombre" class="input">
<input id="c_tel" placeholder="Teléfono" class="input">

<button onclick="crearCliente()" class="btn">Guardar</button>

<ul id="listaClientes"></ul>

</div>
</div>

<!-- VEHICULOS -->
<div id="vehiculos" style="display:none">
<div class="card max-w-xl">

<select id="v_cliente" class="input"></select>
<input id="v_marca" placeholder="Marca" class="input">
<input id="v_modelo" placeholder="Modelo" class="input">

<button onclick="crearVehiculo()" class="btn">Guardar</button>

<ul id="listaVehiculos"></ul>

</div>
</div>

<!-- CAJA -->
<div id="caja" style="display:none">
<div class="card max-w-xl">

<input id="caja_concepto" placeholder="Concepto" class="input">
<input id="caja_monto" placeholder="Monto" class="input">

<select id="caja_tipo" class="input">
<option value="ingreso">Ingreso</option>
<option value="egreso">Egreso</option>
</select>

<button onclick="movimientoCaja()" class="btn">Registrar</button>

<ul id="listaCaja"></ul>

</div>
</div>

</div>

<script>
const sb = supabase.createClient(
"https://wuewcawbpajdehquorfq.supabase.co",
"sb_publishable_nzzOvYY0RYXDUavs-pFH6Q_pqnLU2tb"
);

// TABS
function tab(id,el){
["dashboard","operaciones","turnos","clientes","vehiculos","caja"].forEach(t=>{
document.getElementById(t).style.display="none";
});
document.getElementById(id).style.display="block";
document.querySelectorAll(".menu-item").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

// ================= TURNOS → SERVICIO =================
async function crearTurno(){

const {data:cliente} = await sb.from("clientes")
.insert({nombre:t_cliente.value,telefono:t_tel.value})
.select().single();

const {data:vehiculo} = await sb.from("vehiculos")
.insert({cliente_id:cliente.id,marca:"Auto",modelo:""})
.select().single();

await sb.from("servicios").insert({
vehiculo_id:vehiculo.id,
tipo:t_servicio.value,
estado:"pendiente"
});

cargarServicios();
}

// ================= SERVICIOS =================
async function cargarServicios(){

const {data}=await sb.from("servicios")
.select(`id,tipo,estado,vehiculos(marca,clientes(nombre,telefono))`);

["pendiente","proceso","terminado"].forEach(c=>{
document.getElementById(c).innerHTML=`<h3>${c}</h3>`;
});

data.forEach(s=>{
let el=document.createElement("div");
el.className="task";

el.innerHTML=`
<div>${s.tipo}</div>
<div>${s.vehiculos?.marca}</div>

<div class="flex gap-2 mt-2">
<button onclick="mover('${s.id}','proceso')" class="btn">▶</button>
<button onclick="finalizar(${JSON.stringify(s)})" class="btn">✔</button>
</div>
`;

document.getElementById(s.estado).appendChild(el);
});
}

async function mover(id,estado){
await sb.from("servicios").update({estado}).eq("id",id);
cargarServicios();
}

// WHATSAPP
function finalizar(s){
const tel=s.vehiculos?.clientes?.telefono || "";
window.open(`https://wa.me/54${tel}?text=Vehiculo listo`);
}

// ================= CAJA =================
async function movimientoCaja(){
await sb.from("caja").insert({
concepto:caja_concepto.value,
monto:caja_monto.value,
tipo:caja_tipo.value,
fecha:new Date()
});
cargarCaja();
}

async function cargarCaja(){
const {data}=await sb.from("caja").select("*");
listaCaja.innerHTML="";
data.forEach(c=>{
listaCaja.innerHTML+=`<li>${c.tipo} $${c.monto}</li>`;
});
}

// INIT
cargarServicios();
cargarCaja();
</script>

</body>
</html>
