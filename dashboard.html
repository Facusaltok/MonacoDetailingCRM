<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  background: radial-gradient(circle at top,#0f172a,#020617);
  font-family: Inter;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  position:fixed;
  background:rgba(2,6,23,0.8);
  backdrop-filter: blur(20px);
  border-right:1px solid rgba(255,255,255,.05);
  padding:20px;
}

/* MENU */
.menu-item{
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:5px;
  transition:.2s;
}
.menu-item:hover{
  background:#0f172a;
}
.active{
  background:linear-gradient(135deg,#00c853,#009624);
  color:black;
}

/* CONTENT */
.content{
  margin-left:260px;
  padding:30px;
}

/* CARDS */
.card{
  background:rgba(15,23,42,.6);
  border-radius:20px;
  padding:20px;
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,.05);
  box-shadow:0 20px 50px rgba(0,0,0,.4);
}

/* INPUT */
.input{
  background:#020617;
  border:1px solid #1e293b;
  padding:12px;
  border-radius:10px;
  width:100%;
  margin-bottom:10px;
}

/* BTN */
.btn{
  background:linear-gradient(135deg,#00c853,#009624);
  padding:12px;
  border-radius:10px;
  font-weight:600;
}

/* KANBAN */
.column{
  background:#020617;
  padding:15px;
  border-radius:20px;
  border:1px solid #1e293b;
  min-height:400px;
}
.task{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="mb-8">
  <div class="text-lg font-bold">Monaco</div>
  <div class="text-xs text-gray-400">Detailing CRM</div>
</div>

<div class="menu-item active" onclick="tab('kanban',this)">Operaciones</div>
<div class="menu-item" onclick="tab('crear',this)">Nuevo Servicio</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- TABLERO -->
<div id="kanban">
<div class="grid grid-cols-3 gap-4">

<div class="column" id="pendiente"></div>
<div class="column" id="proceso"></div>
<div class="column" id="terminado"></div>

</div>
</div>

<!-- CREAR -->
<div id="crear" style="display:none">

<div class="card">

<select id="cliente_select" class="input"></select>

<input id="marca" placeholder="Marca" class="input">
<input id="modelo" placeholder="Modelo" class="input">

<select id="tipo" class="input">
<option>PPF</option>
<option>Cerámico</option>
<option>Interior</option>
</select>

<button onclick="crearServicio()" class="btn w-full">Crear servicio</button>

</div>

</div>

</div>

<script>
const sb = supabase.createClient(
"https://wuewcawbpajdehquorfq.supabase.co",
"sb_publishable_nzzOvYY0RYXDUavs-pFH6Q_pqnLU2tb"
);

// TAB
function tab(id,el){
document.getElementById("kanban").style.display="none";
document.getElementById("crear").style.display="none";
document.getElementById(id).style.display="block";

document.querySelectorAll(".menu-item").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

// CLIENTES
async function cargarClientes(){
const {data}=await sb.from("clientes").select("*");
cliente_select.innerHTML="";
data.forEach(c=>{
cliente_select.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`;
});
}

// CREAR SERVICIO COMPLETO
async function crearServicio(){

// 1 crear vehículo
const {data:vehiculo} = await sb.from("vehiculos").insert({
cliente_id:cliente_select.value,
marca:marca.value,
modelo:modelo.value
}).select().single();

// 2 crear servicio
await sb.from("servicios").insert({
vehiculo_id:vehiculo.id,
tipo:tipo.value,
estado:"pendiente"
});

cargarServicios();
tab("kanban", document.querySelector(".menu-item"));
}

// CARGAR SERVICIOS
async function cargarServicios(){

const {data}=await sb.from("servicios")
.select(`id,tipo,estado,vehiculos(marca,modelo,clientes(nombre))`);

["pendiente","proceso","terminado"].forEach(c=>{
document.getElementById(c).innerHTML=`<h3 class="mb-4 capitalize">${c}</h3>`;
});

data.forEach(s=>{

let el=document.createElement("div");
el.className="task";

el.innerHTML=`
<div class="font-semibold">${s.tipo}</div>
<div class="text-sm text-gray-400">${s.vehiculos?.marca} ${s.vehiculos?.modelo}</div>
<div class="text-xs">${s.vehiculos?.clientes?.nombre}</div>
<div class="mt-2 flex gap-2">
<button onclick="mover('${s.id}','proceso')" class="btn">▶</button>
<button onclick="mover('${s.id}','terminado')" class="btn">✔</button>
</div>
`;

document.getElementById(s.estado).appendChild(el);
});

}

// MOVER
async function mover(id,estado){
await sb.from("servicios").update({estado}).eq("id",id);
cargarServicios();
}

// INIT
cargarClientes();
cargarServicios();

</script>

</body>
</html>
