<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  background:#020617;
  color:white;
  font-family:Inter;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#020617;
  border-right:1px solid #111827;
  height:100vh;
  position:fixed;
}

/* MENU */
.menu-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}
.menu-item:hover{
  background:#0f172a;
}
.active{
  background:#00c853;
  color:black;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:30px;
}

/* CARD */
.card{
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(0,255,100,.1);
}

/* BUTTON */
.btn{
  background:#00c853;
  color:black;
  padding:10px;
  border-radius:10px;
  font-weight:600;
}

/* INPUT */
.input{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:8px;
  width:100%;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar p-5">

  <div class="flex items-center gap-3 mb-10">
    <img src="logo.png" class="w-10">
    <span class="font-bold">Monaco</span>
  </div>

  <div class="menu-item active" onclick="tab('servicios')">Servicios</div>
  <div class="menu-item" onclick="tab('clientes')">Clientes</div>
  <div class="menu-item" onclick="tab('turnos')">Turnos</div>
  <div class="menu-item" onclick="tab('caja')">Caja</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- SERVICIOS -->
<div id="servicios">

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="card">
<h3>Cliente</h3>
<select id="cliente_select" class="input mb-3"></select>

<input id="nuevo_nombre" placeholder="Nombre" class="input mb-2">
<input id="nuevo_tel" placeholder="Teléfono" class="input mb-3">

<button onclick="crearCliente()" class="btn w-full">Crear</button>
</div>

<div class="card">
<h3>Vehículo</h3>
<select id="vehiculo_select" class="input mb-3"></select>

<input id="marca" placeholder="Marca" class="input mb-2">
<input id="modelo" placeholder="Modelo" class="input mb-2">
<input id="dominio" placeholder="Patente" class="input mb-3">

<button onclick="crearVehiculo()" class="btn w-full">Agregar</button>
</div>

<div class="card">
<h3>Servicio</h3>

<select id="tipo" class="input mb-2">
<option>PPF Completo</option>
<option>Cerámico</option>
<option>Acrílico</option>
<option>Interior</option>
</select>

<input id="precio" placeholder="Precio" class="input mb-3">

<button onclick="crearServicio()" class="btn w-full">Crear</button>
</div>

</div>

<div class="card">
<h3 class="mb-4">Servicios</h3>

<table class="w-full">
<thead>
<tr>
<th>Servicio</th>
<th>Auto</th>
<th>Cliente</th>
<th>Estado</th>
<th></th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

</div>

</div>

<script>
const SUPABASE_URL = "https://wuewcawbpajdehquorfq.supabase.co";
const SUPABASE_KEY = "sb_publishable_nzzOvYY0RYXDUavs-pFH6Q_pqnLU2tb";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// CLIENTES
async function cargarClientes(){
  const {data} = await sb.from("clientes").select("*");
  cliente_select.innerHTML="";
  data.forEach(c=>{
    cliente_select.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`;
  });
}

// VEHICULOS
async function cargarVehiculos(){
  const {data} = await sb.from("vehiculos").select("*");
  vehiculo_select.innerHTML="";
  data.forEach(v=>{
    vehiculo_select.innerHTML+=`<option value="${v.id}">${v.marca}</option>`;
  });
}

// SERVICIOS
async function cargarServicios(){
  const {data} = await sb.from("servicios")
  .select(`id,tipo,estado,vehiculos(marca,clientes(nombre,telefono))`);

  tabla.innerHTML="";

  data.forEach(s=>{
    tabla.innerHTML+=`
    <tr>
      <td>${s.tipo}</td>
      <td>${s.vehiculos?.marca}</td>
      <td>${s.vehiculos?.clientes?.nombre}</td>
      <td>${s.estado}</td>
      <td>
        <button onclick='terminar(${JSON.stringify(s)})' class="btn">
        ✔
        </button>
      </td>
    </tr>`;
  });
}

// CREAR
async function crearCliente(){
  await sb.from("clientes").insert({
    nombre:nuevo_nombre.value,
    telefono:nuevo_tel.value
  });
  cargarClientes();
}

async function crearVehiculo(){
  await sb.from("vehiculos").insert({
    cliente_id:cliente_select.value,
    marca:marca.value,
    modelo:modelo.value,
    dominio:dominio.value
  });
  cargarVehiculos();
}

async function crearServicio(){
  await sb.from("servicios").insert({
    vehiculo_id:vehiculo_select.value,
    tipo:tipo.value,
    precio:precio.value,
    estado:"pendiente"
  });
  cargarServicios();
}

// WHATSAPP AUTO
function terminar(s){

  sb.from("servicios")
    .update({estado:"terminado"})
    .eq("id",s.id);

  const tel = s.vehiculos?.clientes?.telefono.replace(/[^0-9]/g,"");

  const msg = `Hola ${s.vehiculos?.clientes?.nombre},
tu vehículo ya está listo 🚗✨

Gracias por confiar en Monaco Detailing`;

  window.open(`https://wa.me/54${tel}?text=${encodeURIComponent(msg)}`);
}

// INIT
cargarClientes();
cargarVehiculos();
cargarServicios();
</script>

</body>
</html>
