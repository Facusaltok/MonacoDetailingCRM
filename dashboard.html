<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#030712;
  color:#e5e7eb;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  height:100vh;
  position:fixed;
  background:#020617;
  border-right:1px solid rgba(255,255,255,.05);
  padding:25px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:30px;
}
.logo img{width:36px;border-radius:8px;}
.logo span{font-weight:700;font-size:16px;}

.menu{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:6px;
}
.menu:hover{background:#0f172a;}
.active{background:#00c853;color:black;font-weight:600;}

.content{
  margin-left:270px;
  padding:30px;
}

/* CARD */
.card{
  background:#0f172a;
  border-radius:14px;
  padding:20px;
  border:1px solid rgba(255,255,255,.05);
}

/* INPUT */
.input{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:8px;
  width:100%;
  margin-bottom:10px;
}

/* BTN */
.btn{
  background:#00c853;
  padding:10px;
  border-radius:8px;
  font-weight:600;
}

/* KANBAN */
.column{
  background:#020617;
  padding:15px;
  border-radius:12px;
  border:1px solid #1e293b;
  min-height:400px;
}
.task{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="logo.png">
<span>Monaco CRM</span>
</div>

<div class="menu active" onclick="tab('dashboard',this)">Dashboard</div>
<div class="menu" onclick="tab('operaciones',this)">Operaciones</div>
<div class="menu" onclick="tab('turnos',this)">Turnos</div>
<div class="menu" onclick="tab('clientes',this)">Clientes</div>
<div class="menu" onclick="tab('vehiculos',this)">Vehículos</div>
<div class="menu" onclick="tab('caja',this)">Caja</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="grid grid-cols-4 gap-4">

<div class="card">En proceso <h2 id="kpi_proceso">0</h2></div>
<div class="card">Terminados <h2 id="kpi_terminado">0</h2></div>
<div class="card">Facturación <h2 id="kpi_facturacion">$0</h2></div>
<div class="card">Clientes <h2 id="kpi_clientes">0</h2></div>

</div>
</div>

<!-- OPERACIONES -->
<div id="operaciones" style="display:none">
<div class="grid grid-cols-3 gap-4">
<div class="column" id="pendiente"><h3>Pendiente</h3></div>
<div class="column" id="proceso"><h3>Proceso</h3></div>
<div class="column" id="terminado"><h3>Terminado</h3></div>
</div>
</div>

<!-- TURNOS -->
<div id="turnos" style="display:none">
<div class="card max-w-xl">

<input id="t_cliente" placeholder="Cliente" class="input">
<input id="t_tel" placeholder="Teléfono" class="input">
<input id="t_servicio" placeholder="Servicio" class="input">
<input id="t_fecha" type="date" class="input">

<button onclick="crearTurno()" class="btn w-full">Crear turno</button>

</div>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<div class="card max-w-xl">

<input id="c_nombre" placeholder="Nombre" class="input">
<input id="c_tel" placeholder="Teléfono" class="input">

<button onclick="crearCliente()" class="btn w-full">Guardar</button>

<ul id="listaClientes"></ul>

</div>
</div>

<!-- VEHICULOS -->
<div id="vehiculos" style="display:none">
<div class="card max-w-xl">

<select id="v_cliente" class="input"></select>
<input id="v_marca" placeholder="Marca" class="input">
<input id="v_modelo" placeholder="Modelo" class="input">

<button onclick="crearVehiculo()" class="btn w-full">Guardar</button>

<ul id="listaVehiculos"></ul>

</div>
</div>

<!-- CAJA -->
<div id="caja" style="display:none">
<div class="card max-w-xl">

<input id="cx_concepto" placeholder="Concepto" class="input">
<input id="cx_monto" placeholder="Monto" class="input">

<select id="cx_tipo" class="input">
<option value="ingreso">Ingreso</option>
<option value="egreso">Egreso</option>
</select>

<button onclick="crearCaja()" class="btn w-full">Registrar</button>

<ul id="listaCaja"></ul>

</div>
</div>

</div>

<script>
const sb = supabase.createClient(
"https://wuewcawbpajdehquorfq.supabase.co",
"sb_publishable_nzzOvYY0RYXDUavs-pFH6Q_pqnLU2tb"
);

/* NAV */
function tab(id,el){
["dashboard","operaciones","turnos","clientes","vehiculos","caja"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";

document.querySelectorAll(".menu").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
}

/* CLIENTES */
async function crearCliente(){
await sb.from("clientes").insert({
nombre:c_nombre.value,
telefono:c_tel.value
});
cargarClientes();
}

async function cargarClientes(){
const {data}=await sb.from("clientes").select("*");
listaClientes.innerHTML="";
v_cliente.innerHTML="";
data.forEach(c=>{
listaClientes.innerHTML+=`<li>${c.nombre}</li>`;
v_cliente.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`;
});
}

/* VEHICULOS */
async function crearVehiculo(){
await sb.from("vehiculos").insert({
cliente_id:v_cliente.value,
marca:v_marca.value,
modelo:v_modelo.value
});
cargarVehiculos();
}

async function cargarVehiculos(){
const {data}=await sb.from("vehiculos").select("*");
listaVehiculos.innerHTML="";
data.forEach(v=>{
listaVehiculos.innerHTML+=`<li>${v.marca} ${v.modelo}</li>`;
});
}

/* TURNOS → SERVICIO */
async function crearTurno(){

const {data:clienteInsert}=await sb.from("clientes")
.insert({nombre:t_cliente.value,telefono:t_tel.value})
.select();

const cliente=clienteInsert[0];

const {data:vehiculoInsert}=await sb.from("vehiculos")
.insert({cliente_id:cliente.id,marca:"Auto",modelo:""})
.select();

const vehiculo=vehiculoInsert[0];

await sb.from("servicios").insert({
vehiculo_id:vehiculo.id,
tipo:t_servicio.value,
estado:"pendiente"
});

cargarServicios();
}

/* SERVICIOS */
async function cargarServicios(){

const {data}=await sb.from("servicios")
.select("id,tipo,estado,vehiculos(marca,clientes(nombre,telefono))");

["pendiente","proceso","terminado"].forEach(x=>{
document.getElementById(x).innerHTML=`<h3>${x}</h3>`;
});

data.forEach(s=>{
let el=document.createElement("div");
el.className="task";

el.innerHTML=`
<div>${s.tipo}</div>
<div>${s.vehiculos?.marca}</div>
<button onclick="mover('${s.id}','proceso')" class="btn mt-2">Mover</button>
`;

document.getElementById(s.estado).appendChild(el);
});
}

/* CAJA */
async function crearCaja(){
await sb.from("caja").insert({
concepto:cx_concepto.value,
monto:cx_monto.value,
tipo:cx_tipo.value
});
cargarCaja();
}

async function cargarCaja(){
const {data}=await sb.from("caja").select("*");
listaCaja.innerHTML="";
data.forEach(c=>{
listaCaja.innerHTML+=`<li>${c.tipo} - $${c.monto}</li>`;
});
}

/* INIT */
cargarClientes();
cargarVehiculos();
cargarServicios();
cargarCaja();
</script>

</body>
</html>
