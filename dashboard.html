<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;color:white;font-family:Inter;}
.card{background:#0f172a;padding:20px;border-radius:20px;}
.btn{background:#00c853;color:black;padding:10px 20px;border-radius:10px;}
.input{background:#020617;border:1px solid #1e293b;color:white;padding:10px;border-radius:8px;width:100%;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="flex justify-between p-6">
  <h1 class="text-xl font-bold">Monaco Detailing CRM</h1>
  <button id="logout" class="btn">Salir</button>
</div>

<!-- FORMULARIO -->
<div class="grid grid-cols-3 gap-4 p-6">

<div class="card">
  <h2 class="mb-3 font-bold">Nuevo Cliente</h2>
  <input id="nombre" placeholder="Nombre" class="input mb-2">
  <input id="telefono" placeholder="Teléfono" class="input mb-3">
  <button onclick="crearCliente()" class="btn w-full">Guardar</button>
</div>

<div class="card">
  <h2 class="mb-3 font-bold">Vehículo</h2>
  <input id="cliente_id" placeholder="ID Cliente" class="input mb-2">
  <input id="marca" placeholder="Marca" class="input mb-2">
  <input id="modelo" placeholder="Modelo" class="input mb-2">
  <input id="dominio" placeholder="Patente" class="input mb-3">
  <button onclick="crearVehiculo()" class="btn w-full">Guardar</button>
</div>

<div class="card">
  <h2 class="mb-3 font-bold">Servicio</h2>
  <input id="vehiculo_id" placeholder="ID Vehículo" class="input mb-2">
  <input id="tipo" placeholder="Ej: PPF Completo" class="input mb-2">
  <input id="precio" placeholder="Precio" class="input mb-3">
  <button onclick="crearServicio()" class="btn w-full">Guardar</button>
</div>

</div>

<!-- TABLA -->
<div class="p-6">
  <div class="card">
    <h2 class="mb-4 font-bold">Servicios</h2>

    <table class="w-full text-sm">
      <thead class="text-gray-400">
        <tr>
          <th>Tipo</th>
          <th>Precio</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>

  </div>
</div>

<script>
const SUPABASE_URL = "https://wuewcawbpajdehquorfq.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.xpZ_OqHj0BUwF8BOmq6olg9UiThD7-VBGA2Esj05gYY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGOUT
logout.onclick = async ()=>{
  await sb.auth.signOut();
  location.href="index.html";
}

// CREAR CLIENTE
async function crearCliente(){
  await sb.from("clientes").insert({
    nombre: nombre.value,
    telefono: telefono.value
  });
  alert("Cliente creado");
}

// CREAR VEHICULO
async function crearVehiculo(){
  await sb.from("vehiculos").insert({
    cliente_id: cliente_id.value,
    marca: marca.value,
    modelo: modelo.value,
    dominio: dominio.value
  });
  alert("Vehículo creado");
}

// CREAR SERVICIO
async function crearServicio(){
  await sb.from("servicios").insert({
    vehiculo_id: vehiculo_id.value,
    tipo: tipo.value,
    precio: precio.value
  });
  alert("Servicio creado");
  cargarServicios();
}

// CARGAR SERVICIOS
async function cargarServicios(){
  const {data} = await sb.from("servicios").select("*");

  tabla.innerHTML = "";

  data.forEach(s=>{
    tabla.innerHTML += `
      <tr>
        <td>${s.tipo}</td>
        <td>$${s.precio}</td>
        <td>${s.estado}</td>
      </tr>
    `;
  });
}

cargarServicios();
</script>

</body>
</html>
