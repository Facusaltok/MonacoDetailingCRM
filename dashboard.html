<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  background:#020617;
  font-family:Inter;
  color:white;
}

/* Sidebar */
.sidebar{
  width:260px;
  height:100vh;
  position:fixed;
  background:#020617;
  border-right:1px solid #111827;
}

/* Menu */
.menu-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}
.menu-item:hover{
  background:#0f172a;
}
.active{
  background:#00c853;
  color:black;
}

/* Content */
.content{
  margin-left:260px;
  padding:30px;
}

/* Cards */
.card{
  background:#0f172a;
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(0,255,100,.1);
}

/* Button */
.btn{
  background:#00c853;
  color:black;
  padding:10px;
  border-radius:10px;
  font-weight:600;
}

/* Input */
.input{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:8px;
  width:100%;
  color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar p-6">

  <div class="flex items-center gap-3 mb-10">
    <img src="logo.png" class="w-10">
    <span class="font-bold">Monaco</span>
  </div>

  <div class="menu-item active" onclick="tab('dashboard')">Dashboard</div>
  <div class="menu-item" onclick="tab('servicios')">Servicios</div>
  <div class="menu-item" onclick="tab('clientes')">Clientes</div>
  <div class="menu-item" onclick="tab('turnos')">Turnos</div>
  <div class="menu-item" onclick="tab('caja')">Caja</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD KPIs -->
<div id="dashboard">

<div class="grid grid-cols-4 gap-4 mb-6">

<div class="card">
<p class="text-gray-400">Autos en proceso</p>
<h2 id="kpi_proceso" class="text-2xl font-bold">0</h2>
</div>

<div class="card">
<p class="text-gray-400">Servicios terminados</p>
<h2 id="kpi_terminados" class="text-2xl font-bold">0</h2>
</div>

<div class="card">
<p class="text-gray-400">Facturación total</p>
<h2 id="kpi_facturacion" class="text-2xl font-bold">$0</h2>
</div>

<div class="card">
<p class="text-gray-400">Clientes</p>
<h2 id="kpi_clientes" class="text-2xl font-bold">0</h2>
</div>

</div>

</div>

<!-- SERVICIOS -->
<div id="servicios" style="display:none">

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="card">
<h3 class="mb-3">Cliente</h3>
<select id="cliente_select" class="input mb-3"></select>

<input id="nuevo_nombre" placeholder="Nuevo cliente" class="input mb-2">
<input id="nuevo_tel" placeholder="Teléfono" class="input mb-3">
<button onclick="crearCliente()" class="btn w-full">Crear</button>
</div>

<div class="card">
<h3 class="mb-3">Vehículo</h3>
<select id="vehiculo_select" class="input mb-3"></select>

<input id="marca" placeholder="Marca" class="input mb-2">
<input id="modelo" placeholder="Modelo" class="input mb-2">
<input id="dominio" placeholder="Patente" class="input mb-3">
<button onclick="crearVehiculo()" class="btn w-full">Agregar</button>
</div>

<div class="card">
<h3 class="mb-3">Servicio</h3>

<select id="tipo" class="input mb-2">
<option>PPF Completo</option>
<option>Tratamiento Cerámico</option>
<option>Acrílico</option>
<option>Interior</option>
<option>Pulido</option>
</select>

<input id="precio" placeholder="Precio" class="input mb-3">
<button onclick="crearServicio()" class="btn w-full">Crear</button>
</div>

</div>

<div class="card">
<table class="w-full text-sm">
<thead>
<tr>
<th>Servicio</th>
<th>Auto</th>
<th>Cliente</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<div class="card">
<ul id="listaClientes"></ul>
</div>
</div>

<!-- TURNOS -->
<div id="turnos" style="display:none">
<div class="card">
<input id="turno_cliente" placeholder="Cliente" class="input mb-2">
<input id="turno_servicio" placeholder="Servicio" class="input mb-2">
<input id="turno_fecha" type="date" class="input mb-2">
<button onclick="crearTurno()" class="btn w-full">Crear turno</button>
<ul id="listaTurnos"></ul>
</div>
</div>

<!-- CAJA -->
<div id="caja" style="display:none">
<div class="card">
<input id="concepto" placeholder="Concepto" class="input mb-2">
<input id="monto" placeholder="Monto" class="input mb-2">
<button onclick="agregarCaja()" class="btn w-full">Agregar</button>
<ul id="listaCaja"></ul>
</div>
</div>

</div>

<script>
const SUPABASE_URL = "https://wuewcawbpajdehquorfq.supabase.co";
const SUPABASE_KEY = "sb_publishable_nzzOvYY0RYXDUavs-pFH6Q_pqnLU2tb";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Tabs
function tab(id){
  ["dashboard","servicios","clientes","turnos","caja"].forEach(t=>{
    document.getElementById(t).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

// KPIs
async function cargarKPIs(){
  const {data:servicios} = await sb.from("servicios").select("*");
  const {data:clientes} = await sb.from("clientes").select("*");

  document.getElementById("kpi_proceso").innerText =
    servicios.filter(s=>s.estado==="proceso").length;

  document.getElementById("kpi_terminados").innerText =
    servicios.filter(s=>s.estado==="terminado").length;

  document.getElementById("kpi_facturacion").innerText =
    "$" + servicios.reduce((a,s)=>a+(s.precio||0),0);

  document.getElementById("kpi_clientes").innerText = clientes.length;
}

// CRUD básico
async function crearCliente(){
  await sb.from("clientes").insert({
    nombre:nuevo_nombre.value,
    telefono:nuevo_tel.value
  });
  cargarClientes();
}

async function crearVehiculo(){
  await sb.from("vehiculos").insert({
    cliente_id:cliente_select.value,
    marca:marca.value,
    modelo:modelo.value,
    dominio:dominio.value
  });
  cargarVehiculos();
}

async function crearServicio(){
  await sb.from("servicios").insert({
    vehiculo_id:vehiculo_select.value,
    tipo:tipo.value,
    precio:precio.value,
    estado:"pendiente"
  });
  cargarServicios();
  cargarKPIs();
}

// Cargas
async function cargarClientes(){
  const {data} = await sb.from("clientes").select("*");
  cliente_select.innerHTML="";
  listaClientes.innerHTML="";
  data.forEach(c=>{
    cliente_select.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`;
    listaClientes.innerHTML+=`<li>${c.nombre}</li>`;
  });
}

async function cargarVehiculos(){
  const {data} = await sb.from("vehiculos").select("*");
  vehiculo_select.innerHTML="";
  data.forEach(v=>{
    vehiculo_select.innerHTML+=`<option value="${v.id}">${v.marca}</option>`;
  });
}

async function cargarServicios(){
  const {data} = await sb.from("servicios")
  .select(`id,tipo,estado,vehiculos(marca,clientes(nombre))`);

  tabla.innerHTML="";
  data.forEach(s=>{
    tabla.innerHTML+=`
    <tr>
      <td>${s.tipo}</td>
      <td>${s.vehiculos?.marca}</td>
      <td>${s.vehiculos?.clientes?.nombre}</td>
      <td>${s.estado}</td>
    </tr>`;
  });
}

// INIT
cargarClientes();
cargarVehiculos();
cargarServicios();
cargarKPIs();
</script>

</body>
</html>
