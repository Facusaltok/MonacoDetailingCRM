<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Monaco</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;color:white;font-family:Inter;}
.card{background:#0f172a;padding:20px;border-radius:20px;}
.btn{background:#00c853;color:black;padding:10px 20px;border-radius:10px;}
</style>
</head>

<body>

<div class="p-6 flex justify-between">
<h1 class="text-xl font-bold">Monaco Detailing CRM</h1>
<button id="logout" class="btn">Salir</button>
</div>

<div class="grid grid-cols-4 gap-4 p-6">

<div class="card">
<p>Autos en proceso</p>
<h2 class="text-2xl">12</h2>
</div>

<div class="card">
<p>Turnos hoy</p>
<h2 class="text-2xl">5</h2>
</div>

<div class="card">
<p>Facturación</p>
<h2 class="text-2xl">$800.000</h2>
</div>

<div class="card">
<p>Clientes</p>
<h2 class="text-2xl">120</h2>
</div>

</div>

<script>
const SUPABASE_URL = "https://TU_URL";
const SUPABASE_KEY = "TU_KEY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

logout.onclick = async ()=>{
  await sb.auth.signOut();
  location.href="index.html";
}
</script>

</body>
</html>
