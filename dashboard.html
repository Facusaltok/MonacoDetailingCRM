<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Inter;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:260px;
  height:100vh;
  position:fixed;
  background:#020617;
  border-right:1px solid #111827;
  padding:20px;
}

/* LOGO */
.logo-container{
  width:42px;
  height:42px;
  border-radius:10px;
  background:linear-gradient(135deg,#00c853,#009624);
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-container img{
  width:26px;
  filter:brightness(0) invert(1);
}

/* MENU */
.menu-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:5px;
  transition:.2s;
}
.menu-item:hover{
  background:#0f172a;
}
.active{
  background:#00c853;
  color:black;
}

/* ================= CONTENT ================= */
.content{
  margin-left:260px;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* ================= CARDS ================= */
.card{
  background:rgba(15,23,42,.7);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(0,255,100,.1);
  backdrop-filter: blur(15px);
}

/* ================= BOTONES ================= */
.btn{
  background:linear-gradient(135deg,#00c853,#009624);
  color:black;
  padding:10px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

/* ================= INPUT ================= */
.input{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:8px;
  width:100%;
  color:white;
  margin-bottom:10px;
}

/* ================= KANBAN ================= */
.column{
  background:#020617;
  padding:15px;
  border-radius:20px;
  border:1px solid #1e293b;
  min-height:400px;
}
.task{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:grab;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="flex items-center gap-3 mb-8">
  <div class="logo-container">
    <img src="logo.png">
  </div>
  <div>
    <div class="font-semibold">Monaco</div>
    <div class="text-xs text-gray-400">Detailing CRM</div>
  </div>
</div>

<div class="menu-item active" onclick="tab('dashboard',this)">Dashboard</div>
<div class="menu-item" onclick="tab('kanban',this)">Operaciones</div>
<div class="menu-item" onclick="tab('clientes',this)">Clientes</div>
<div class="menu-item" onclick="tab('turnos',this)">Turnos</div>
<div class="menu-item" onclick="tab('caja',this)">Caja</div>

</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="grid grid-cols-4 gap-4">

<div class="card">
<p>Autos en proceso</p>
<h2 id="kpi_proceso">0</h2>
</div>

<div class="card">
<p>Terminados</p>
<h2 id="kpi_terminado">0</h2>
</div>

<div class="card">
<p>Facturación</p>
<h2 id="kpi_facturacion">$0</h2>
</div>

<div class="card">
<p>Clientes</p>
<h2 id="kpi_clientes">0</h2>
</div>

</div>

</div>

<!-- KANBAN -->
<div id="kanban" style="display:none">

<div class="grid grid-cols-3 gap-4">

<div class="column" ondrop="drop(event,'pendiente')" ondragover="allowDrop(event)">
<h3>Pendiente</h3>
<div id="pendiente"></div>
</div>

<div class="column" ondrop="drop(event,'proceso')" ondragover="allowDrop(event)">
<h3>Proceso</h3>
<div id="proceso"></div>
</div>

<div class="column" ondrop="drop(event,'terminado')" ondragover="allowDrop(event)">
<h3>Terminado</h3>
<div id="terminado"></div>
</div>

</div>

</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<div class="card">
<h3>Clientes</h3>
<ul id="listaClientes"></ul>
</div>
</div>

<!-- TURNOS -->
<div id="turnos" style="display:none">
<div class="card">
<input id="turno_cliente" placeholder="Cliente" class="input">
<input id="turno_servicio" placeholder="Servicio" class="input">
<input type="date" id="turno_fecha" class="input">
<button onclick="crearTurno()" class="btn w-full">Crear turno</button>
<ul id="listaTurnos"></ul>
</div>
</div>

<!-- CAJA -->
<div id="caja" style="display:none">
<div class="card">
<input id="concepto" placeholder="Concepto" class="input">
<input id="monto" placeholder="Monto" class="input">
<button onclick="agregarCaja()" class="btn w-full">Agregar</button>
<ul id="listaCaja"></ul>
</div>
</div>

</div>

<script>

const sb = supabase.createClient(
"https://wuewcawbpajdehquorfq.supabase.co",
"sb_publishable_nzzOvYY0RYXDUavs-pFH6Q_pqnLU2tb"
);

// TAB
function tab(id,el){
["dashboard","kanban","clientes","turnos","caja"].forEach(t=>{
document.getElementById(t).style.display="none";
});
document.getElementById(id).style.display="block";

document.querySelectorAll(".menu-item").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

// KPI
async function cargarKPIs(){
const {data:servicios}=await sb.from("servicios").select("*");
const {data:clientes}=await sb.from("clientes").select("*");

document.getElementById("kpi_proceso").innerText=
servicios.filter(s=>s.estado==="proceso").length;

document.getElementById("kpi_terminado").innerText=
servicios.filter(s=>s.estado==="terminado").length;

document.getElementById("kpi_facturacion").innerText=
"$"+servicios.reduce((a,s)=>a+(s.precio||0),0);

document.getElementById("kpi_clientes").innerText=clientes.length;
}

// SERVICIOS
async function cargarServicios(){
const {data}=await sb.from("servicios")
.select(`id,tipo,estado,vehiculos(marca,clientes(nombre,telefono))`);

["pendiente","proceso","terminado"].forEach(c=>{
document.getElementById(c).innerHTML="";
});

data.forEach(s=>{
let el=document.createElement("div");
el.className="task";
el.draggable=true;
el.id=s.id;

el.innerHTML=`
<div>${s.tipo}</div>
<div>${s.vehiculos?.marca}</div>
<button onclick='whatsapp(${JSON.stringify(s)})' class="btn mt-2">WA</button>
`;

el.ondragstart=drag;
document.getElementById(s.estado).appendChild(el);
});
}

// DRAG
function allowDrop(ev){ev.preventDefault();}
function drag(ev){ev.dataTransfer.setData("id",ev.target.id);}
async function drop(ev,estado){
ev.preventDefault();
let id=ev.dataTransfer.getData("id");

await sb.from("servicios").update({estado}).eq("id",id);
cargarServicios();
cargarKPIs();
}

// WHATSAPP
function whatsapp(s){
const tel=s.vehiculos?.clientes?.telefono?.replace(/[^0-9]/g,"");
const msg=`Hola ${s.vehiculos?.clientes?.nombre}, tu vehículo está listo 🚗`;
window.open(`https://wa.me/54${tel}?text=${encodeURIComponent(msg)}`);
}

// INIT
cargarServicios();
cargarKPIs();

</script>

</body>
</html>
