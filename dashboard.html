<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monaco Detailing CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#020617;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  position:fixed;
  background:#020617;
  border-right:1px solid #111827;
  padding:20px;
}

.menu-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:5px;
}
.menu-item:hover{background:#0f172a;}
.active{background:#00c853;color:black;}

.content{
  margin-left:260px;
  padding:30px;
}

/* UI */
.card{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
}
.input{
  background:#020617;
  border:1px solid #1e293b;
  padding:10px;
  border-radius:8px;
  width:100%;
  margin-bottom:10px;
}
.btn{
  background:#00c853;
  padding:10px;
  border-radius:8px;
  width:100%;
  font-weight:600;
}
.column{
  background:#020617;
  padding:15px;
  border-radius:14px;
  border:1px solid #1e293b;
  min-height:400px;
}
.task{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="mb-8">
  <div class="text-lg font-bold">Monaco</div>
  <div class="text-xs text-gray-400">CRM PRO</div>
</div>

<div class="menu-item active" onclick="tab('dashboard',this)">Dashboard</div>
<div class="menu-item" onclick="tab('kanban',this)">Operaciones</div>
<div class="menu-item" onclick="tab('turnos',this)">Turnos</div>
<div class="menu-item" onclick="tab('clientes',this)">Clientes</div>
<div class="menu-item" onclick="tab('vehiculos',this)">Vehículos</div>

</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="grid grid-cols-4 gap-4">

<div class="card">
<p>En proceso</p>
<h2 id="kpi_proceso">0</h2>
</div>

<div class="card">
<p>Terminados</p>
<h2 id="kpi_terminado">0</h2>
</div>

<div class="card">
<p>Facturación</p>
<h2 id="kpi_facturacion">$0</h2>
</div>

<div class="card">
<p>Clientes</p>
<h2 id="kpi_clientes">0</h2>
</div>

</div>
</div>

<!-- KANBAN -->
<div id="kanban" style="display:none">
<div class="grid grid-cols-3 gap-4">

<div class="column" id="pendiente"><h3>Pendiente</h3></div>
<div class="column" id="proceso"><h3>Proceso</h3></div>
<div class="column" id="terminado"><h3>Terminado</h3></div>

</div>
</div>

<!-- TURNOS -->
<div id="turnos" style="display:none">
<div class="card max-w-xl">

<input id="turno_cliente" placeholder="Cliente" class="input">
<input id="turno_tel" placeholder="Teléfono" class="input">
<input id="turno_servicio" placeholder="Servicio" class="input">
<input id="turno_fecha" type="date" class="input">

<button onclick="crearTurno()" class="btn">Crear turno</button>

<ul id="listaTurnos" class="mt-4"></ul>

</div>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<div class="card max-w-xl">

<input id="cliente_nombre" placeholder="Nombre" class="input">
<input id="cliente_tel" placeholder="Teléfono" class="input">

<button onclick="guardarCliente()" class="btn">Guardar</button>

<ul id="listaClientes" class="mt-4"></ul>

</div>
</div>

<!-- VEHICULOS -->
<div id="vehiculos" style="display:none">
<div class="card max-w-xl">

<select id="vehiculo_cliente" class="input"></select>
<input id="vehiculo_marca" placeholder="Marca" class="input">
<input id="vehiculo_modelo" placeholder="Modelo" class="input">

<button onclick="guardarVehiculo()" class="btn">Guardar</button>

<ul id="listaVehiculos" class="mt-4"></ul>

</div>
</div>

</div>

<script>
const sb = supabase.createClient(
"https://wuewcawbpajdehquorfq.supabase.co",
"sb_publishable_nzzOvYY0RYXDUavs-pFH6Q_pqnLU2tb"
);

// TAB
function tab(id,el){
["dashboard","kanban","turnos","clientes","vehiculos"].forEach(t=>{
document.getElementById(t).style.display="none";
});
document.getElementById(id).style.display="block";
document.querySelectorAll(".menu-item").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

// ================= CLIENTES =================
let clienteEdit=null;

async function cargarClientes(){
const {data}=await sb.from("clientes").select("*");
listaClientes.innerHTML="";
vehiculo_cliente.innerHTML="";

data.forEach(c=>{
listaClientes.innerHTML+=`
<li class="flex justify-between">
${c.nombre}
<div>
<button onclick='editarCliente(${JSON.stringify(c)})'>✏️</button>
<button onclick='eliminarCliente("${c.id}")'>❌</button>
</div>
</li>`;
vehiculo_cliente.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`;
});
}

function editarCliente(c){
cliente_nombre.value=c.nombre;
cliente_tel.value=c.telefono;
clienteEdit=c.id;
}

async function guardarCliente(){
if(clienteEdit){
await sb.from("clientes").update({
nombre:cliente_nombre.value,
telefono:cliente_tel.value
}).eq("id",clienteEdit);
clienteEdit=null;
}else{
await sb.from("clientes").insert({
nombre:cliente_nombre.value,
telefono:cliente_tel.value
});
}
cliente_nombre.value="";
cliente_tel.value="";
cargarClientes();
cargarKPIs();
}

async function eliminarCliente(id){
await sb.from("clientes").delete().eq("id",id);
cargarClientes();
}

// ================= VEHICULOS =================
let vehiculoEdit=null;

async function cargarVehiculos(){
const {data}=await sb.from("vehiculos").select("*");
listaVehiculos.innerHTML="";

data.forEach(v=>{
listaVehiculos.innerHTML+=`
<li class="flex justify-between">
${v.marca} ${v.modelo}
<div>
<button onclick='editarVehiculo(${JSON.stringify(v)})'>✏️</button>
<button onclick='eliminarVehiculo("${v.id}")'>❌</button>
</div>
</li>`;
});
}

function editarVehiculo(v){
vehiculo_marca.value=v.marca;
vehiculo_modelo.value=v.modelo;
vehiculo_cliente.value=v.cliente_id;
vehiculoEdit=v.id;
}

async function guardarVehiculo(){
if(vehiculoEdit){
await sb.from("vehiculos").update({
marca:vehiculo_marca.value,
modelo:vehiculo_modelo.value,
cliente_id:vehiculo_cliente.value
}).eq("id",vehiculoEdit);
vehiculoEdit=null;
}else{
await sb.from("vehiculos").insert({
cliente_id:vehiculo_cliente.value,
marca:vehiculo_marca.value,
modelo:vehiculo_modelo.value
});
}
vehiculo_marca.value="";
vehiculo_modelo.value="";
cargarVehiculos();
}

async function eliminarVehiculo(id){
await sb.from("vehiculos").delete().eq("id",id);
cargarVehiculos();
}

// ================= TURNOS → SERVICIO =================
async function crearTurno(){

let {data:cliente} = await sb.from("clientes")
.select("*").eq("nombre",turno_cliente.value).single();

if(!cliente){
const res = await sb.from("clientes").insert({
nombre:turno_cliente.value,
telefono:turno_tel.value
}).select().single();
cliente = res.data;
}

const {data:vehiculo} = await sb.from("vehiculos").insert({
cliente_id:cliente.id,
marca:"Auto",
modelo:""
}).select().single();

await sb.from("servicios").insert({
vehiculo_id:vehiculo.id,
tipo:turno_servicio.value,
estado:"pendiente"
});

// 🔥 APARECE EN OPERACIONES
cargarServicios();

await sb.from("turnos").insert({
cliente:turno_cliente.value,
servicio:turno_servicio.value,
fecha:turno_fecha.value
});

turno_cliente.value="";
turno_tel.value="";
turno_servicio.value="";
turno_fecha.value="";

cargarTurnos();
}

// ================= SERVICIOS =================
async function cargarServicios(){

const {data}=await sb.from("servicios")
.select(`id,tipo,estado,vehiculos(marca,modelo,clientes(nombre,telefono))`);

["pendiente","proceso","terminado"].forEach(c=>{
document.getElementById(c).innerHTML=`<h3>${c}</h3>`;
});

data.forEach(s=>{
let el=document.createElement("div");
el.className="task";

el.innerHTML=`
<div>${s.tipo}</div>
<div class="text-sm text-gray-400">${s.vehiculos?.marca}</div>

<div class="flex gap-2 mt-2">
<button onclick="mover('${s.id}','proceso')" class="btn">▶</button>
<button onclick="finalizarServicio(${JSON.stringify(s)})" class="btn">✔</button>
<button onclick="eliminarServicio('${s.id}')" class="btn bg-red-500">X</button>
</div>
`;

document.getElementById(s.estado).appendChild(el);
});
}

async function mover(id,estado){
await sb.from("servicios").update({estado}).eq("id",id);
cargarServicios();
cargarKPIs();
}

async function eliminarServicio(id){
await sb.from("servicios").delete().eq("id",id);
cargarServicios();
}

async function finalizarServicio(s){

await sb.from("servicios").update({estado:"terminado"}).eq("id",s.id);

const tel = s.vehiculos?.clientes?.telefono?.replace(/[^0-9]/g,"");

const msg = `Hola ${s.vehiculos?.clientes?.nombre},
tu ${s.vehiculos?.marca} ${s.vehiculos?.modelo} ya está listo 🙌`;

window.open(`https://wa.me/54${tel}?text=${encodeURIComponent(msg)}`);

cargarServicios();
cargarKPIs();
}

// ================= TURNOS =================
async function cargarTurnos(){
const {data}=await sb.from("turnos").select("*");
listaTurnos.innerHTML="";
data.forEach(t=>{
listaTurnos.innerHTML+=`<li>${t.fecha} - ${t.cliente}</li>`;
});
}

// ================= KPI =================
async function cargarKPIs(){
const {data:s}=await sb.from("servicios").select("*");
const {data:c}=await sb.from("clientes").select("*");

kpi_proceso.innerText=s.filter(x=>x.estado==="proceso").length;
kpi_terminado.innerText=s.filter(x=>x.estado==="terminado").length;
kpi_facturacion.innerText="$"+s.reduce((a,b)=>a+(b.precio||0),0);
kpi_clientes.innerText=c.length;
}

// INIT
cargarClientes();
cargarVehiculos();
cargarServicios();
cargarTurnos();
cargarKPIs();

</script>

</body>
</html>
